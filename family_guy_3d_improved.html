<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #0a1628; font-family: 'Arial Black', sans-serif; }
  #canvas { display: block; }
  #ui {
    position: absolute; top: 16px; left: 16px;
    color: #fff; font-size: 13px; font-weight: 900;
    background: rgba(0,0,0,0.7); padding: 8px 18px;
    border-radius: 30px; border-left: 4px solid #ffcc00;
    letter-spacing: 1.5px; pointer-events: none;
    text-shadow: 0 1px 4px #000;
  }
  #hint {
    position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.5); font-size: 11px;
    background: rgba(0,0,0,0.4); padding: 5px 14px; border-radius: 20px;
    pointer-events: none; letter-spacing: 1px;
  }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="ui">🎭 FAMILY GUY 3D — IMPROVED MODELS</div>
<div id="hint">🖱 DRAG · SCROLL ZOOM · RIGHT CLICK PAN</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const W = window.innerWidth, H = window.innerHeight;
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0d1f3c);
scene.fog = new THREE.FogExp2(0x0d1f3c, 0.012);

const camera = new THREE.PerspectiveCamera(42, W/H, 0.1, 200);
camera.position.set(0, 3.5, 11);
camera.lookAt(0, 2, 0);

const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), antialias: true });
renderer.setSize(W, H);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));

// --- LIGHTING ---
scene.add(new THREE.AmbientLight(0x607090, 0.7));

const sun = new THREE.DirectionalLight(0xfff3d0, 1.4);
sun.position.set(5, 10, 5);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left = -8; sun.shadow.camera.right = 8;
sun.shadow.camera.top = 8; sun.shadow.camera.bottom = -8;
sun.shadow.camera.far = 30;
scene.add(sun);

scene.add(Object.assign(new THREE.PointLight(0x88aaff, 0.7), {position: new THREE.Vector3(-4,4,-4)}));
scene.add(Object.assign(new THREE.PointLight(0xffaa55, 0.5), {position: new THREE.Vector3(4,3,-3)}));
scene.add(Object.assign(new THREE.PointLight(0xffffff, 0.35), {position: new THREE.Vector3(0,1.5,4)}));

// --- FLOOR ---
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(30, 30),
  new THREE.MeshStandardMaterial({ color: 0x1a1a2e, roughness: 0.9 })
);
floor.rotation.x = -Math.PI/2;
floor.receiveShadow = true;
scene.add(floor);

// Grid lines
const grid = new THREE.GridHelper(20, 30, 0x334466, 0x223355);
grid.material.transparent = true; grid.material.opacity = 0.3;
scene.add(grid);

// --- MATERIALS ---
const M = (color, rough=0.4, metal=0.05, emissive=0) => new THREE.MeshStandardMaterial({color, roughness:rough, metalness:metal, emissive});
const skin = (c=0xf5c98d) => M(c, 0.45, 0.02);

// Shadow + cast helper
function shadow(m) { m.castShadow = true; m.receiveShadow = true; return m; }

// --- GEOMETRY BUILDERS ---
function cyl(rt, rb, h, s=20) { return new THREE.CylinderGeometry(rt,rb,h,s); }
function sph(r, w=32, h=32) { return new THREE.SphereGeometry(r,w,h); }
function box(x,y,z) { return new THREE.BoxGeometry(x,y,z); }

// =============================================
// PETER GRIFFIN - Heavy-set dad, white shirt
// =============================================
function buildPeter() {
  const g = new THREE.Group();
  const sk = skin(0xf2ca96);
  const shirt = M(0xffffff, 0.5);
  const pants = M(0x2b3a55, 0.6);
  const shoe = M(0x2a1800, 0.8);
  const hair = M(0x7a4a1e, 0.7);

  // === LEGS ===
  [-.42, .42].forEach((x, i) => {
    const leg = shadow(new THREE.Mesh(cyl(0.24, 0.26, 0.95, 14), pants));
    leg.position.set(x, 0.48, 0);
    g.add(leg);
    const sh = shadow(new THREE.Mesh(new THREE.BoxGeometry(0.45, 0.2, 0.62), shoe));
    sh.position.set(x, 0.02, 0.1);
    g.add(sh);
    // shoe toe bump
    const toe = shadow(new THREE.Mesh(sph(0.2,16,10), shoe));
    toe.scale.set(1,0.65,1);
    toe.position.set(x, 0.05, 0.38);
    g.add(toe);
  });

  // === TORSO (wide, layered) ===
  const torsoMain = shadow(new THREE.Mesh(cyl(0.88, 0.9, 1.15, 24), shirt));
  torsoMain.position.y = 1.26;
  g.add(torsoMain);

  // belly sphere (very round)
  const belly = shadow(new THREE.Mesh(sph(0.82, 32, 32), shirt));
  belly.scale.set(1.05, 0.88, 0.78);
  belly.position.set(0, 1.08, 0.48);
  g.add(belly);

  // shirt collar
  const collar = new THREE.Mesh(cyl(0.35, 0.38, 0.18, 16), M(0xf0f0f0));
  collar.position.y = 1.88;
  g.add(collar);

  // === ARMS ===
  [
    { x: -1.02, rx: 0, rz: 0.55, side: -1 },
    { x:  1.02, rx: 0, rz: -0.55, side: 1 }
  ].forEach(({x, rz, side}) => {
    // upper arm
    const ua = shadow(new THREE.Mesh(cyl(0.25, 0.22, 0.68, 12), shirt));
    ua.position.set(x, 1.38, 0.08);
    ua.rotation.z = rz;
    g.add(ua);
    // elbow
    const elbow = new THREE.Mesh(sph(0.22,12,12), shirt);
    elbow.position.set(x + side*0.28, 1.05, 0.1);
    g.add(elbow);
    // forearm
    const fa = shadow(new THREE.Mesh(cyl(0.21, 0.19, 0.6, 12), sk));
    fa.position.set(x + side*0.42, 0.78, 0.12);
    fa.rotation.z = rz * 0.8;
    g.add(fa);
    // hand (round fist)
    const hand = shadow(new THREE.Mesh(sph(0.22,16,16), sk));
    hand.position.set(x + side*0.58, 0.52, 0.15);
    g.add(hand);
    // thumb nub
    const thumb = new THREE.Mesh(sph(0.1,8,8), sk);
    thumb.position.set(x + side*0.7, 0.56, 0.24);
    g.add(thumb);
  });

  // === HEAD ===
  const head = shadow(new THREE.Mesh(sph(0.72, 56, 56), sk));
  head.position.y = 2.6;
  g.add(head);

  // double chin
  const chin = new THREE.Mesh(sph(0.48, 32, 32), sk);
  chin.scale.set(0.9, 0.55, 0.65);
  chin.position.set(0, 2.22, 0.56);
  g.add(chin);

  // neck
  const neck = new THREE.Mesh(cyl(0.32, 0.36, 0.28, 14), sk);
  neck.position.y = 2.05;
  g.add(neck);

  // === HAIR (brown toupee-like) ===
  const hairMesh = new THREE.Mesh(sph(0.68, 32, 24), hair);
  hairMesh.scale.set(0.96, 0.38, 0.88);
  hairMesh.position.set(0, 3.08, 0.2);
  g.add(hairMesh);
  // hair side bumps
  [-0.52, 0.52].forEach(x => {
    const hs = new THREE.Mesh(sph(0.24, 16, 12), hair);
    hs.position.set(x, 3.0, 0.08);
    g.add(hs);
  });

  // === EARS ===
  [-0.74, 0.74].forEach((x, i) => {
    const ear = new THREE.Mesh(sph(0.2, 24, 24), sk);
    ear.scale.set(0.6, 1, 0.55);
    ear.position.set(x, 2.6, 0.05);
    g.add(ear);
  });

  // === EYES (large cartoon eyes) ===
  [-0.3, 0.3].forEach((x, i) => {
    const eyeW = shadow(new THREE.Mesh(sph(0.2, 32, 32), M(0xffffff, 0.15)));
    eyeW.position.set(x, 2.72, 0.72);
    g.add(eyeW);

    const iris = new THREE.Mesh(sph(0.115, 24, 24), M(0x5a3010, 0.1));
    iris.position.set(x, 2.71, 0.9);
    g.add(iris);

    const pupil = new THREE.Mesh(sph(0.065, 16, 16), M(0x060606));
    pupil.position.set(x, 2.705, 1.0);
    g.add(pupil);

    const shine = new THREE.Mesh(sph(0.03, 8, 8), M(0xffffff, 0.05));
    shine.position.set(x - 0.04, 2.74, 1.04);
    g.add(shine);

    // eyelid
    const lid = new THREE.Mesh(new THREE.TorusGeometry(0.18, 0.035, 8, 32, Math.PI), M(0xd4a87a, 0.5));
    lid.position.set(x, 2.76, 0.74);
    lid.rotation.x = -0.2;
    g.add(lid);
  });

  // === EYEBROWS (thick, arched) ===
  [-0.35, 0.35].forEach((x, i) => {
    const brow = new THREE.Mesh(new THREE.TorusGeometry(0.2, 0.055, 8, 24, Math.PI * 0.7), M(0x6b3c18));
    brow.position.set(x, 2.92, 0.68);
    brow.rotation.x = -0.4;
    brow.rotation.z = i === 0 ? 0.25 : -0.25;
    g.add(brow);
  });

  // === NOSE (bulbous) ===
  const nose = new THREE.Mesh(sph(0.18, 24, 24), skin(0xe5b889));
  nose.scale.set(1, 0.85, 0.95);
  nose.position.set(0, 2.58, 0.88);
  g.add(nose);
  // nostrils
  [-0.07, 0.07].forEach(x => {
    const nostril = new THREE.Mesh(sph(0.065, 12, 12), M(0xc49870, 0.6));
    nostril.position.set(x, 2.51, 0.97);
    g.add(nostril);
  });

  // === MOUTH (open grin) ===
  const mouthBg = new THREE.Mesh(sph(0.22, 16, 16), M(0x7a3020, 0.5));
  mouthBg.scale.set(1.1, 0.6, 0.6);
  mouthBg.position.set(0, 2.42, 0.84);
  g.add(mouthBg);

  // upper lip
  const upLip = new THREE.Mesh(new THREE.TorusGeometry(0.2, 0.048, 8, 32, Math.PI), M(0xd4956a));
  upLip.position.set(0, 2.45, 0.82);
  upLip.rotation.x = 0.25;
  upLip.rotation.z = Math.PI;
  g.add(upLip);

  // teeth
  [-0.08, 0.08].forEach(x => {
    const tooth = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.08), M(0xf5f5ee, 0.2));
    tooth.position.set(x, 2.44, 0.92);
    g.add(tooth);
  });

  // === GLASSES (Peter doesn't have glasses, but add belt) ===
  const belt = new THREE.Mesh(cyl(0.92, 0.93, 0.12, 24), M(0x1a1a1a, 0.5));
  belt.position.y = 1.0;
  g.add(belt);
  const buckle = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.14, 0.1), M(0xbbaa44, 0.1, 0.8));
  buckle.position.set(0, 1.0, 0.94);
  g.add(buckle);

  g.position.set(-2.6, 0.1, 0);
  return g;
}

// =============================================
// LOIS GRIFFIN - Slim, red hair, pearl necklace
// =============================================
function buildLois() {
  const g = new THREE.Group();
  const sk = skin(0xf5d4a8);
  const dress = M(0x4e7f4c, 0.4); // green top
  const pants2 = M(0x4a3828, 0.6);
  const shoeM = M(0x1a1010, 0.7);
  const redHair = M(0xb83820, 0.55);

  // Legs (slim)
  [-.32, .32].forEach((x, i) => {
    const leg = shadow(new THREE.Mesh(cyl(0.18, 0.2, 1.0, 12), pants2));
    leg.position.set(x, 0.5, 0);
    g.add(leg);
    // heel shoe
    const shoeBase = shadow(new THREE.Mesh(new THREE.BoxGeometry(0.38, 0.14, 0.55), shoeM));
    shoeBase.position.set(x, 0.01, 0.08);
    g.add(shoeBase);
    const heel = new THREE.Mesh(cyl(0.04, 0.04, 0.22, 6), shoeM);
    heel.position.set(x, -0.08, -0.22);
    g.add(heel);
    const toeBump = new THREE.Mesh(sph(0.18, 12, 10), shoeM);
    toeBump.scale.set(1, 0.6, 1);
    toeBump.position.set(x, 0.06, 0.35);
    g.add(toeBump);
  });

  // torso (elegant, slim)
  const torso = shadow(new THREE.Mesh(cyl(0.52, 0.56, 1.22, 22), dress));
  torso.position.y = 1.27;
  g.add(torso);

  // bust / chest curve
  const bust = new THREE.Mesh(sph(0.42, 24, 24), dress);
  bust.scale.set(1.1, 0.7, 0.75);
  bust.position.set(0, 1.62, 0.32);
  g.add(bust);

  // neck
  const neck = shadow(new THREE.Mesh(cyl(0.19, 0.22, 0.3, 14), sk));
  neck.position.y = 1.94;
  g.add(neck);

  // === ARMS ===
  [
    { x: -0.6, side: -1, rz: 0.45 },
    { x:  0.6, side:  1, rz: -0.45 }
  ].forEach(({x, side, rz}) => {
    const ua = shadow(new THREE.Mesh(cyl(0.18, 0.16, 0.62, 12), dress));
    ua.position.set(x, 1.42, 0.06);
    ua.rotation.z = rz;
    g.add(ua);
    const fa = shadow(new THREE.Mesh(cyl(0.15, 0.13, 0.55, 12), sk));
    fa.position.set(x + side*0.34, 1.08, 0.1);
    fa.rotation.z = rz * 0.6;
    g.add(fa);
    const hand = shadow(new THREE.Mesh(sph(0.17, 16, 16), sk));
    hand.position.set(x + side*0.5, 0.84, 0.12);
    g.add(hand);
  });

  // === HEAD (oval, more feminine) ===
  const head = shadow(new THREE.Mesh(sph(0.6, 56, 56), sk));
  head.scale.set(0.88, 1.08, 0.88);
  head.position.y = 2.56;
  g.add(head);

  // jaw definition
  const jaw = new THREE.Mesh(sph(0.38, 24, 24), sk);
  jaw.scale.set(0.85, 0.5, 0.72);
  jaw.position.set(0, 2.25, 0.38);
  g.add(jaw);

  // === HAIR (red, voluminous, side-parted) ===
  const hairTop = new THREE.Mesh(sph(0.68, 32, 32), redHair);
  hairTop.scale.set(1.02, 0.72, 0.95);
  hairTop.position.set(0, 2.82, 0.12);
  g.add(hairTop);

  // side waves
  [-1, 1].forEach(side => {
    const sideH = new THREE.Mesh(sph(0.34, 20, 20), redHair);
    sideH.scale.set(0.6, 1.3, 0.7);
    sideH.position.set(side * 0.6, 2.55, 0.1);
    g.add(sideH);
    // lower curl
    const curl = new THREE.Mesh(sph(0.25, 16, 16), redHair);
    curl.scale.set(0.65, 1.4, 0.7);
    curl.position.set(side * 0.58, 2.22, 0.1);
    g.add(curl);
  });

  // back hair
  const backH = new THREE.Mesh(sph(0.62, 24, 24), redHair);
  backH.scale.set(1, 1.2, 0.7);
  backH.position.set(0, 2.55, -0.3);
  g.add(backH);

  // === EARS ===
  [-0.56, 0.56].forEach(x => {
    const ear = new THREE.Mesh(sph(0.16, 20, 20), sk);
    ear.scale.set(0.55, 1, 0.5);
    ear.position.set(x, 2.57, 0.0);
    g.add(ear);
    // earring
    const ring = new THREE.Mesh(new THREE.TorusGeometry(0.055, 0.015, 8, 24), M(0xffdd88, 0.1, 0.9));
    ring.position.set(x, 2.45, 0.05);
    ring.rotation.y = Math.PI / 2;
    g.add(ring);
  });

  // === EYES (blue, bright) ===
  [-0.25, 0.25].forEach((x, i) => {
    const eyeW = new THREE.Mesh(sph(0.155, 32, 32), M(0xffffff, 0.1));
    eyeW.position.set(x, 2.68, 0.68);
    g.add(eyeW);
    const iris = new THREE.Mesh(sph(0.09, 24, 24), M(0x3a7dcc, 0.1));
    iris.position.set(x, 2.675, 0.82);
    g.add(iris);
    const pupil = new THREE.Mesh(sph(0.05, 16, 16), M(0x050505));
    pupil.position.set(x, 2.67, 0.9);
    g.add(pupil);
    const shine = new THREE.Mesh(sph(0.025, 8, 8), M(0xffffff, 0.05));
    shine.position.set(x - 0.03, 2.7, 0.94);
    g.add(shine);
    // lashes
    const lash = new THREE.Mesh(new THREE.TorusGeometry(0.14, 0.028, 8, 24, Math.PI*0.8), M(0x111111));
    lash.position.set(x, 2.71, 0.65);
    lash.rotation.x = -0.35;
    g.add(lash);
  });

  // eyebrows (thin arched)
  [-0.28, 0.28].forEach((x, i) => {
    const brow = new THREE.Mesh(new THREE.TorusGeometry(0.165, 0.032, 8, 24, Math.PI * 0.65), M(0x882218));
    brow.position.set(x, 2.82, 0.62);
    brow.rotation.x = -0.35;
    brow.rotation.z = i === 0 ? 0.3 : -0.3;
    g.add(brow);
  });

  // nose (small, upturned)
  const nose = new THREE.Mesh(sph(0.1, 20, 20), skin(0xebc99a));
  nose.scale.set(0.9, 0.75, 0.85);
  nose.position.set(0, 2.6, 0.78);
  g.add(nose);

  // Lips (red)
  const upLip = new THREE.Mesh(new THREE.TorusGeometry(0.15, 0.04, 8, 32, Math.PI), M(0xcc3333, 0.3));
  upLip.position.set(0, 2.49, 0.76);
  upLip.rotation.x = 0.2; upLip.rotation.z = Math.PI;
  g.add(upLip);
  const loLip = new THREE.Mesh(new THREE.TorusGeometry(0.14, 0.042, 8, 32, Math.PI), M(0xcc3333, 0.3));
  loLip.position.set(0, 2.44, 0.76);
  loLip.rotation.x = 0.05;
  g.add(loLip);

  // Pearl necklace
  for(let i = 0; i < 18; i++) {
    const a = (i / 18) * Math.PI * 1.05 - Math.PI * 0.52;
    const pearl = new THREE.Mesh(sph(0.055, 12, 12), M(0xfff0e8, 0.15, 0.3));
    pearl.position.set(Math.sin(a)*0.46, 2.0, Math.cos(a)*0.46);
    g.add(pearl);
  }

  g.position.set(2.4, 0.1, 0);
  return g;
}

// =============================================
// STEWIE GRIFFIN - Big head toddler, football skull
// =============================================
function buildStewie() {
  const g = new THREE.Group();
  const sk = skin(0xfbe8c2);
  const redSuit = M(0xd04020, 0.4);
  const blueShoe = M(0x2a5a9a, 0.6);

  // tiny legs
  [-.22, .22].forEach((x, i) => {
    const leg = shadow(new THREE.Mesh(cyl(0.15, 0.16, 0.7, 12), redSuit));
    leg.position.set(x, 0.35, 0);
    g.add(leg);
    const sh = shadow(new THREE.Mesh(new THREE.BoxGeometry(0.33, 0.14, 0.48), blueShoe));
    sh.position.set(x, 0.0, 0.06);
    g.add(sh);
    const toeBump = new THREE.Mesh(sph(0.16, 12, 10), blueShoe);
    toeBump.scale.set(1, 0.65, 1);
    toeBump.position.set(x, 0.04, 0.3);
    g.add(toeBump);
  });

  // body (short, round onesie)
  const body = shadow(new THREE.Mesh(cyl(0.5, 0.48, 0.88, 22), redSuit));
  body.position.y = 0.87;
  g.add(body);

  // bottom poof
  const poof = new THREE.Mesh(sph(0.46, 22, 22), redSuit);
  poof.scale.set(1.05, 0.6, 0.9);
  poof.position.set(0, 0.65, 0.22);
  g.add(poof);

  // small arms (pointing down slightly)
  [
    { x: -0.56, side: -1, rz: 0.6 },
    { x:  0.56, side:  1, rz: -0.6 }
  ].forEach(({x, side, rz}) => {
    const ua = shadow(new THREE.Mesh(cyl(0.14, 0.12, 0.48, 10), redSuit));
    ua.position.set(x, 1.0, 0.06);
    ua.rotation.z = rz;
    g.add(ua);
    const hand = shadow(new THREE.Mesh(sph(0.14, 14, 14), sk));
    hand.position.set(x + side*0.3, 0.74, 0.08);
    g.add(hand);
    // tiny fingers
    [0, 0.1, -0.1].forEach(fz => {
      const f = new THREE.Mesh(sph(0.04, 8, 8), sk);
      f.position.set(x + side*0.38, 0.68, 0.1 + fz);
      g.add(f);
    });
  });

  // collar / neck detail
  const collar2 = new THREE.Mesh(cyl(0.28, 0.32, 0.14, 14), redSuit);
  collar2.position.y = 1.33;
  g.add(collar2);
  const neck = new THREE.Mesh(cyl(0.2, 0.22, 0.2, 14), sk);
  neck.position.y = 1.46;
  g.add(neck);

  // === BIG HEAD (football shape - elongated back) ===
  const head = shadow(new THREE.Mesh(sph(0.75, 64, 64), sk));
  head.scale.set(0.82, 1.0, 1.02);
  head.position.set(0, 2.16, 0);
  g.add(head);

  // back of skull bumps
  const skull = new THREE.Mesh(sph(0.55, 32, 32), sk);
  skull.scale.set(0.88, 0.85, 0.75);
  skull.position.set(0, 2.22, -0.52);
  g.add(skull);

  // flat forehead
  const fore = new THREE.Mesh(sph(0.52, 28, 28), sk);
  fore.scale.set(0.9, 0.55, 0.8);
  fore.position.set(0, 2.62, 0.32);
  g.add(fore);

  // === EARS (small) ===
  [-0.64, 0.64].forEach(x => {
    const ear = new THREE.Mesh(sph(0.15, 20, 20), sk);
    ear.scale.set(0.55, 1, 0.5);
    ear.position.set(x, 2.18, 0.05);
    g.add(ear);
  });

  // === EYES (HUGE - stewie's most iconic feature) ===
  [-0.31, 0.31].forEach((x, i) => {
    // socket
    const socket = new THREE.Mesh(sph(0.24, 32, 32), M(0xffffff, 0.1));
    socket.position.set(x, 2.28, 0.73);
    g.add(socket);

    // iris (green)
    const iris = new THREE.Mesh(sph(0.14, 24, 24), M(0x3a8c48, 0.1));
    iris.position.set(x, 2.275, 0.96);
    g.add(iris);

    // pupil
    const pupil = new THREE.Mesh(sph(0.085, 16, 16), M(0x080808));
    pupil.position.set(x, 2.27, 1.08);
    g.add(pupil);

    // shine
    const shine = new THREE.Mesh(sph(0.04, 8, 8), M(0xffffff, 0.05));
    shine.position.set(x - 0.05, 2.31, 1.14);
    g.add(shine);
  });

  // === ANGRY EYEBROWS ===
  [-0.38, 0.38].forEach((x, i) => {
    const brow = new THREE.Mesh(new THREE.BoxGeometry(0.32, 0.09, 0.1), M(0x8b5a2b, 0.5));
    brow.position.set(x, 2.52, 0.7);
    brow.rotation.z = i === 0 ? -0.35 : 0.35;
    g.add(brow);
  });

  // nose (tiny)
  const nose = new THREE.Mesh(sph(0.1, 18, 18), skin(0xebd3aa));
  nose.scale.set(1, 0.75, 0.85);
  nose.position.set(0, 2.18, 0.85);
  g.add(nose);

  // === PACIFIER ===
  const pacRing = new THREE.Mesh(new THREE.TorusGeometry(0.16, 0.04, 14, 40), M(0xffbbaa, 0.3));
  pacRing.position.set(0, 2.02, 0.88);
  pacRing.rotation.x = Math.PI/2;
  g.add(pacRing);
  const pacBulb = new THREE.Mesh(sph(0.1, 14, 14), M(0xff9977, 0.3));
  pacBulb.position.set(0, 2.02, 1.04);
  g.add(pacBulb);
  const pacShield = new THREE.Mesh(new THREE.BoxGeometry(0.32, 0.2, 0.04), M(0xffbbaa, 0.3));
  pacShield.position.set(0, 2.02, 0.82);
  g.add(pacShield);

  // tiny hair curl
  const curl = new THREE.Mesh(sph(0.1, 12, 12), M(0xa06030, 0.5));
  curl.position.set(0.18, 2.8, 0.6);
  g.add(curl);

  g.position.set(-0.1, 0.35, -1.2);
  return g;
}

// =============================================
// BUILD CHARACTERS
// =============================================
const peter = buildPeter();
const lois = buildLois();
const stewie = buildStewie();
scene.add(peter, lois, stewie);

// Labels
function makeLabel(text, color, character, yOff) {
  const canvas = document.createElement('canvas');
  canvas.width = 320; canvas.height = 60;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.beginPath(); ctx.roundRect(0, 0, 320, 60, 30); ctx.fill();
  ctx.fillStyle = color;
  ctx.fillRect(0, 0, 8, 60);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 22px Arial Black, Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, 164, 30);
  const tex = new THREE.CanvasTexture(canvas);
  const labelMesh = new THREE.Mesh(
    new THREE.PlaneGeometry(2.2, 0.42),
    new THREE.MeshBasicMaterial({ map: tex, transparent: true, depthTest: false })
  );
  labelMesh.position.copy(character.position);
  labelMesh.position.y += yOff;
  scene.add(labelMesh);
  return labelMesh;
}

const pLabel = makeLabel('PETER GRIFFIN', '#ffaa44', peter, 3.0);
const lLabel = makeLabel('LOIS GRIFFIN', '#66cc66', lois, 2.9);
const sLabel = makeLabel('STEWIE GRIFFIN', '#ff7755', stewie, 2.8);

// Decorative ring on floor
const ring = new THREE.Mesh(new THREE.TorusGeometry(3.2, 0.06, 32, 120), M(0xffcc22, 0.3, 0.4, 0x221100));
ring.rotation.x = Math.PI/2; ring.position.y = 0.01;
scene.add(ring);
const ring2 = new THREE.Mesh(new THREE.TorusGeometry(4.0, 0.03, 16, 100), M(0x446688, 0.3, 0.3, 0x001122));
ring2.rotation.x = Math.PI/2; ring2.position.y = 0.01;
scene.add(ring2);

// Particles
const pCount = 600;
const pPos = new Float32Array(pCount*3);
for(let i=0;i<pCount;i++){
  pPos[i*3]=(Math.random()-0.5)*22;
  pPos[i*3+1]=Math.random()*6;
  pPos[i*3+2]=(Math.random()-0.5)*16-2;
}
const pGeo = new THREE.BufferGeometry();
pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
const pts = new THREE.Points(pGeo, new THREE.PointsMaterial({color:0xaaccff, size:0.055, transparent:true, opacity:0.45}));
scene.add(pts);

// === ORBIT CONTROLS (manual) ===
let isDragging = false, isRight = false;
let lastX = 0, lastY = 0;
let theta = 0, phi = 0.42, radius = 11;
let panX = 0, panY = 2;

function updateCamera() {
  camera.position.x = panX + radius * Math.sin(theta) * Math.cos(phi);
  camera.position.y = panY + radius * Math.sin(phi);
  camera.position.z = radius * Math.cos(theta) * Math.cos(phi);
  camera.lookAt(panX, panY - 0.5, 0);
  // Labels always face camera
  [pLabel, lLabel, sLabel].forEach(l => l.quaternion.copy(camera.quaternion));
}

const canvas = document.getElementById('canvas');
canvas.addEventListener('mousedown', e => {
  isDragging = true; isRight = e.button === 2;
  lastX = e.clientX; lastY = e.clientY;
});
canvas.addEventListener('contextmenu', e => e.preventDefault());
window.addEventListener('mouseup', () => isDragging = false);
window.addEventListener('mousemove', e => {
  if(!isDragging) return;
  const dx = e.clientX - lastX, dy = e.clientY - lastY;
  lastX = e.clientX; lastY = e.clientY;
  if(isRight) { panX -= dx*0.008; panY += dy*0.008; }
  else { theta -= dx*0.008; phi = Math.max(-0.1, Math.min(1.1, phi - dy*0.008)); }
  updateCamera();
});
canvas.addEventListener('wheel', e => {
  radius = Math.max(3, Math.min(20, radius + e.deltaY * 0.02));
  updateCamera();
});
// Touch
let lastTouchDist = 0;
canvas.addEventListener('touchstart', e => {
  if(e.touches.length === 1) { isDragging = true; isRight = false; lastX = e.touches[0].clientX; lastY = e.touches[0].clientY; }
  if(e.touches.length === 2) { lastTouchDist = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY); }
  e.preventDefault();
}, {passive:false});
canvas.addEventListener('touchmove', e => {
  if(e.touches.length === 1 && isDragging) {
    const dx = e.touches[0].clientX - lastX, dy = e.touches[0].clientY - lastY;
    lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
    theta -= dx*0.01; phi = Math.max(-0.1, Math.min(1.1, phi - dy*0.01));
    updateCamera();
  }
  if(e.touches.length === 2) {
    const d = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
    radius = Math.max(3, Math.min(20, radius - (d-lastTouchDist)*0.04));
    lastTouchDist = d; updateCamera();
  }
  e.preventDefault();
}, {passive:false});
canvas.addEventListener('touchend', () => isDragging = false);
updateCamera();

// Animation
let t = 0;
function animate() {
  requestAnimationFrame(animate);
  t += 0.013;

  peter.position.y = 0.1 + Math.sin(t * 1.1) * 0.006;
  lois.position.y = 0.1 + Math.sin(t * 1.3) * 0.005;
  stewie.position.y = 0.35 + Math.sin(t * 1.6) * 0.008;

  pLabel.position.y = peter.position.y + 3.0;
  lLabel.position.y = lois.position.y + 2.9;
  sLabel.position.y = stewie.position.y + 2.8;

  pts.rotation.y += 0.0006;
  ring.rotation.z += 0.002;

  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  const w = window.innerWidth, h = window.innerHeight;
  camera.aspect = w/h; camera.updateProjectionMatrix();
  renderer.setSize(w, h);
});
</script>
