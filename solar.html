<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solar System Explorer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #020408;
    color: #e8eaf0;
    font-family: 'Space Grotesk', sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  #canvas-container {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  canvas { display: block; }

  /* TOP BAR */
  #topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    background: linear-gradient(to bottom, rgba(2,4,8,0.95) 0%, transparent 100%);
  }

  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: #fff;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-dot {
    width: 10px; height: 10px;
    background: #f5a623;
    border-radius: 50%;
    box-shadow: 0 0 12px #f5a623;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.6;transform:scale(0.8)} }

  .top-controls {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .btn {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    color: #e8eaf0;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 7px 14px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }

  .btn:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.25); }
  .btn.active { background: rgba(245,166,35,0.15); border-color: rgba(245,166,35,0.5); color: #f5a623; }

  /* SPEED SLIDER */
  .speed-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.08em;
  }

  input[type=range] {
    -webkit-appearance: none;
    width: 80px; height: 2px;
    background: rgba(255,255,255,0.2);
    border-radius: 2px;
    outline: none;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px; height: 12px;
    background: #f5a623;
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 0 6px rgba(245,166,35,0.6);
  }

  /* SIDE PANEL */
  #panel {
    position: fixed;
    right: 0; top: 0; bottom: 0;
    width: 280px;
    z-index: 50;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 20px 20px 20px 0;
  }

  #planet-info {
    background: rgba(8,12,20,0.85);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 24px;
    backdrop-filter: blur(16px);
    pointer-events: all;
    transform: translateX(110%);
    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }

  #planet-info.visible { transform: translateX(0); }

  .info-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 18px;
  }

  .planet-icon {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: #333;
    flex-shrink: 0;
  }

  .planet-name {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.02em;
    line-height: 1.1;
  }

  .planet-type {
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }

  .stat-box {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 8px;
    padding: 10px 12px;
  }

  .stat-label {
    font-size: 9px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .stat-value {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    color: #fff;
  }

  .stat-unit {
    font-size: 9px;
    color: rgba(255,255,255,0.4);
    margin-left: 2px;
  }

  .info-desc {
    font-size: 12px;
    line-height: 1.7;
    color: rgba(255,255,255,0.5);
    border-top: 1px solid rgba(255,255,255,0.06);
    padding-top: 14px;
  }

  #close-btn {
    position: absolute;
    top: 16px; right: 16px;
    background: rgba(255,255,255,0.07);
    border: none;
    color: rgba(255,255,255,0.5);
    width: 24px; height: 24px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  #close-btn:hover { background: rgba(255,255,255,0.14); color: #fff; }

  /* PLANET NAV */
  #planet-nav {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    display: flex;
    gap: 8px;
    align-items: center;
    background: rgba(8,12,20,0.8);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 50px;
    padding: 10px 16px;
    backdrop-filter: blur(12px);
  }

  .nav-planet {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 8px;
    transition: background 0.2s;
    position: relative;
  }

  .nav-planet:hover { background: rgba(255,255,255,0.07); }
  .nav-planet.selected { background: rgba(245,166,35,0.1); }

  .nav-planet .dot {
    border-radius: 50%;
    flex-shrink: 0;
  }

  .nav-planet span {
    font-size: 8px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    font-weight: 500;
  }

  .nav-planet.selected span { color: rgba(245,166,35,0.8); }

  /* TOOLTIP */
  #tooltip {
    position: fixed;
    pointer-events: none;
    z-index: 200;
    background: rgba(8,12,20,0.9);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 7px 12px;
    font-size: 12px;
    font-weight: 500;
    backdrop-filter: blur(8px);
    opacity: 0;
    transition: opacity 0.15s;
    white-space: nowrap;
  }

  /* LOADING */
  #loading {
    position: fixed;
    inset: 0;
    z-index: 1000;
    background: #020408;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    transition: opacity 0.8s;
  }

  .loading-logo {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.3em;
    color: rgba(255,255,255,0.5);
  }

  .loading-bar-wrap {
    width: 200px;
    height: 1px;
    background: rgba(255,255,255,0.1);
    border-radius: 1px;
    overflow: hidden;
  }

  .loading-bar {
    height: 100%;
    background: #f5a623;
    width: 0%;
    transition: width 0.3s;
    box-shadow: 0 0 8px #f5a623;
  }

  .loading-text {
    font-size: 11px;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0.25);
    text-transform: uppercase;
  }

  /* ORBIT RINGS UI */
  #orbits-toggle { }

  /* RESPONSIVE */
  @media (max-width: 600px) {
    #panel { width: 240px; }
    #planet-nav { scale: 0.8; bottom: 10px; }
  }
</style>
</head>
<body>

<div id="loading">
  <div class="loading-logo">SOLAR SYSTEM</div>
  <div class="loading-bar-wrap"><div class="loading-bar" id="load-bar"></div></div>
  <div class="loading-text" id="load-text">Initializing...</div>
</div>

<div id="canvas-container"></div>

<div id="topbar">
  <div class="logo">
    <div class="logo-dot"></div>
    SOLAR EXPLORER
  </div>
  <div class="top-controls">
    <div class="speed-wrap">
      SPEED
      <input type="range" id="speed-slider" min="0" max="5" step="0.1" value="1">
    </div>
    <button class="btn active" id="orbits-toggle">ORBITS</button>
    <button class="btn" id="labels-toggle">LABELS</button>
    <button class="btn" id="reset-btn">RESET</button>
  </div>
</div>

<div id="panel">
  <div id="planet-info" style="position:relative;">
    <button id="close-btn">✕</button>
    <div class="info-header">
      <canvas class="planet-icon" id="info-icon" width="44" height="44"></canvas>
      <div>
        <div class="planet-name" id="info-name">Planet</div>
        <div class="planet-type" id="info-type">Type</div>
      </div>
    </div>
    <div class="info-grid">
      <div class="stat-box"><div class="stat-label">Diameter</div><div class="stat-value" id="stat-diameter">—</div></div>
      <div class="stat-box"><div class="stat-label">Orbit Period</div><div class="stat-value" id="stat-period">—</div></div>
      <div class="stat-box"><div class="stat-label">Distance</div><div class="stat-value" id="stat-distance">—</div></div>
      <div class="stat-box"><div class="stat-label">Moons</div><div class="stat-value" id="stat-moons">—</div></div>
    </div>
    <div class="info-desc" id="info-desc">—</div>
  </div>
</div>

<div id="planet-nav"></div>
<div id="tooltip"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>

    name: 'Uranus', type: 'Ice Giant', radius: 1.7, color: '#7de8e8',

      {name:'Miranda', radius:0.12, orbitR:3.0, speed:1.2, color:'#c0c8d0', gradient:['#d8e0e8','#c0c8d0','#9098a8','#607080']},
      {name:'Ariel', radius:0.14, orbitR:4.0, speed:0.82, color:'#c8d4e0', gradient:['#e0e8f0','#c8d4e0','#a0b0c0','#708090']}
    ],

// ---- Three.js Setup ----
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 2000);
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
container.appendChild(renderer.domElement);

camera.position.set(0, 55, 90);
camera.lookAt(0, 0, 0);

// Controls (manual)
let isDragging = false, prevMouse = {x:0,y:0};
let spherical = { r: 110, phi: Math.PI/4, theta: 0 };

renderer.domElement.addEventListener('mousedown', e => { isDragging=true; prevMouse={x:e.clientX,y:e.clientY}; });
renderer.domElement.addEventListener('touchstart', e => { isDragging=true; prevMouse={x:e.touches[0].clientX,y:e.touches[0].clientY}; });
window.addEventListener('mouseup', ()=>isDragging=false);
window.addEventListener('touchend', ()=>isDragging=false);

window.addEventListener('mousemove', e => {
  if(!isDragging) return;
  const dx = e.clientX-prevMouse.x, dy = e.clientY-prevMouse.y;
  spherical.theta -= dx*0.005;
  spherical.phi = Math.max(0.1, Math.min(Math.PI*0.45, spherical.phi - dy*0.004));
  prevMouse = {x:e.clientX,y:e.clientY};
});

window.addEventListener('touchmove', e => {
  if(!isDragging) return;
  const dx = e.touches[0].clientX-prevMouse.x, dy = e.touches[0].clientY-prevMouse.y;
  spherical.theta -= dx*0.005;
  spherical.phi = Math.max(0.1, Math.min(Math.PI*0.45, spherical.phi - dy*0.004));
  prevMouse = {x:e.touches[0].clientX,y:e.touches[0].clientY};
});

renderer.domElement.addEventListener('wheel', e => {
  spherical.r = Math.max(20, Math.min(250, spherical.r + e.deltaY*0.08));
});

// Lighting
const sunLight = new THREE.PointLight(0xfff5e0, 3, 500);
sunLight.position.set(0,0,0);
scene.add(sunLight);
const ambientLight = new THREE.AmbientLight(0x111122, 0.4);
scene.add(ambientLight);

// Stars background
function makeStars() {
  const geo = new THREE.BufferGeometry();
  const pos = [];
  for(let i=0;i<6000;i++){
    const r=600, phi=Math.random()*2*Math.PI, theta=Math.random()*Math.PI;
    pos.push(r*Math.sin(theta)*Math.cos(phi), r*Math.cos(theta), r*Math.sin(theta)*Math.sin(phi));
  }
  geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
  const mat = new THREE.PointsMaterial({color:0xffffff, size:0.6, sizeAttenuation:true});
  scene.add(new THREE.Points(geo, mat));
}
makeStars();

// Texture generator from gradient
function makeTexture(gradientStops, type='sphere', w=256, h=128) {
  const canvas = document.createElement('canvas');
  canvas.width=w; canvas.height=h;
  const ctx = canvas.getContext('2d');

  if(type==='sun') {
    const grd = ctx.createRadialGradient(w/2,h/2,w*0.05, w/2,h/2,w*0.5);
    gradientStops.forEach((s,i)=>grd.addColorStop(i/(gradientStops.length-1), s));
    ctx.fillStyle=grd;
    ctx.fillRect(0,0,w,h);
    // sunspots
    for(let i=0;i<12;i++){
      ctx.beginPath();
      const sx=Math.random()*w, sy=Math.random()*h, sr=3+Math.random()*8;
      ctx.arc(sx,sy,sr,0,2*Math.PI);
      ctx.fillStyle='rgba(0,0,0,0.15)';
      ctx.fill();
    }
  } else if(type==='gas') {
    // bands
    const n = 12+Math.floor(Math.random()*6);
    for(let i=0;i<n;i++){
      const y0 = (i/n)*h, y1 = ((i+1)/n)*h;
      const idx = i%gradientStops.length;
      const grd = ctx.createLinearGradient(0,y0,0,y1);
      grd.addColorStop(0, gradientStops[idx]);
      grd.addColorStop(1, gradientStops[(idx+1)%gradientStops.length]);
      ctx.fillStyle=grd;
      ctx.fillRect(0,y0,w,y1-y0+1);
    }
    // Great red spot for Jupiter
    if(gradientStops[0]==='#e8c898'){
      ctx.beginPath();
      ctx.ellipse(w*0.3, h*0.55, 16, 10, 0, 0, 2*Math.PI);
      ctx.fillStyle='rgba(180,60,20,0.7)';
      ctx.fill();
    }
    // noise
    for(let i=0;i<2000;i++){
      ctx.fillStyle=`rgba(255,255,255,${Math.random()*0.04})`;
      ctx.fillRect(Math.random()*w, Math.random()*h, 1,1);
    }
  } else if(type==='ice') {
    const grd = ctx.createLinearGradient(0,0,w,h);
    gradientStops.forEach((s,i)=>grd.addColorStop(i/(gradientStops.length-1), s));
    ctx.fillStyle=grd;
    ctx.fillRect(0,0,w,h);
    for(let i=0;i<800;i++){
      ctx.fillStyle=`rgba(255,255,255,${Math.random()*0.1})`;
      ctx.fillRect(Math.random()*w, Math.random()*h, 2, 1);
    }
  } else if(type==='earth') {
    // ocean base
    ctx.fillStyle='#1a6fa8';
    ctx.fillRect(0,0,w,h);
    // continents (rough)
    ctx.fillStyle='#3a7a30';
    // NA
    ctx.beginPath(); ctx.ellipse(w*0.22,h*0.38,28,22,0.3,0,2*Math.PI); ctx.fill();
    // SA
    ctx.beginPath(); ctx.ellipse(w*0.28,h*0.62,16,24,0.1,0,2*Math.PI); ctx.fill();
    // Europe/Africa
    ctx.beginPath(); ctx.ellipse(w*0.5,h*0.35,12,16,-0.1,0,2*Math.PI); ctx.fill();
    ctx.beginPath(); ctx.ellipse(w*0.51,h*0.6,14,22,0.2,0,2*Math.PI); ctx.fill();
    // Asia
    ctx.beginPath(); ctx.ellipse(w*0.68,h*0.32,38,20,-0.2,0,2*Math.PI); ctx.fill();
    // Australia
    ctx.beginPath(); ctx.ellipse(w*0.77,h*0.65,14,10,0.1,0,2*Math.PI); ctx.fill();
    // ice caps
    ctx.fillStyle='rgba(240,248,255,0.9)';
    ctx.fillRect(0,0,w,8);
    ctx.fillRect(0,h-10,w,10);
    // clouds
    ctx.fillStyle='rgba(255,255,255,0.25)';
    for(let i=0;i<30;i++){
      ctx.beginPath();
      ctx.ellipse(Math.random()*w, Math.random()*h, 15+Math.random()*20, 4+Math.random()*6, Math.random()*Math.PI, 0, 2*Math.PI);
      ctx.fill();
    }
  } else if(type==='moon') {
    ctx.fillStyle=gradientStops[1]||'#c0c0c0';
    ctx.fillRect(0,0,w,h);
    // craters
    for(let i=0;i<30;i++){
      const cx=Math.random()*w, cy=Math.random()*h, r=2+Math.random()*8;
      ctx.beginPath(); ctx.arc(cx,cy,r,0,2*Math.PI);
      ctx.fillStyle=`rgba(0,0,0,0.2)`;
      ctx.fill();
      ctx.beginPath(); ctx.arc(cx-r*0.2,cy-r*0.2,r,0,2*Math.PI);
      ctx.strokeStyle=`rgba(255,255,255,0.15)`;
      ctx.lineWidth=0.5;
      ctx.stroke();
    }
  } else {
    // terrestrial
    const grd = ctx.createLinearGradient(0,0,w,h);
    gradientStops.forEach((s,i)=>grd.addColorStop(i/(gradientStops.length-1), s));
    ctx.fillStyle=grd;
    ctx.fillRect(0,0,w,h);
    // craters
    for(let i=0;i<25;i++){
      ctx.beginPath();
      ctx.arc(Math.random()*w, Math.random()*h, 2+Math.random()*6, 0, 2*Math.PI);
      ctx.fillStyle='rgba(0,0,0,0.12)';
      ctx.fill();
    }
    // noise
    for(let i=0;i<1500;i++){
      ctx.fillStyle=`rgba(255,255,255,${Math.random()*0.06})`;
      ctx.fillRect(Math.random()*w, Math.random()*h, 1,1);
    }
  }

  const tex = new THREE.CanvasTexture(canvas);
  return tex;
}

// Ring texture
function makeRingTexture(colors) {
  const canvas = document.createElement('canvas');
  canvas.width=512; canvas.height=1;
  const ctx = canvas.getContext('2d');
  const grd = ctx.createLinearGradient(0,0,512,0);
  grd.addColorStop(0,'transparent');
  grd.addColorStop(0.05,colors[0]);
  grd.addColorStop(0.3,colors[1]);
  grd.addColorStop(0.6,colors[0]);
  grd.addColorStop(0.85,colors[1]);
  grd.addColorStop(1,'transparent');
  ctx.fillStyle=grd;
  ctx.fillRect(0,0,512,1);
  return new THREE.CanvasTexture(canvas);
}

// Build planet objects
const planetObjects = [];
let orbitLines = [];
let labelSprites = [];
let speedMultiplier = 1.0;
let showOrbits = true;
let showLabels = false;
let selectedPlanet = null;
let time = 0;
let angles = {};

function getTextType(p) {
  if(p.name==='Sun') return 'sun';
  if(p.name==='Earth') return 'earth';
  if(p.type==='Gas Giant') return 'gas';
  if(p.type==='Ice Giant') return 'ice';
  if(p.moons.length>0 && p.name!=='Earth') return 'terrestrial';
  return 'terrestrial';
}

function getMoonTextType(m) {
  return 'moon';
}

PLANETS.forEach((pd, i) => {
  angles[pd.name] = Math.random()*Math.PI*2;

  const type = getTextType(pd);
  const tex = makeTexture(pd.gradient, type, pd.name==='Sun'?512:256, 128);
  const geo = new THREE.SphereGeometry(pd.radius, 48, 32);
  let mat;
  if(pd.name==='Sun') {
    mat = new THREE.MeshStandardMaterial({map:tex, emissive:new THREE.Color(pd.emissive||pd.color), emissiveIntensity:0.8, roughness:0.8});
  } else {
    mat = new THREE.MeshStandardMaterial({map:tex, roughness:0.85, metalness:0.05});
  }
  const mesh = new THREE.Mesh(geo, mat);
  mesh.rotation.z = THREE.MathUtils.degToRad(pd.tilt||0);
  mesh.userData = {planet: pd, isMoon: false};

  const group = new THREE.Group();
  group.add(mesh);
  scene.add(group);

  // Rings
  if(pd.rings) {
    const ri = pd.radius*1.35, ro = pd.radius*2.4;
    const rGeo = new THREE.RingGeometry(ri, ro, 128);
    // fix UVs
    const pos = rGeo.attributes.position;
    const uv = rGeo.attributes.uv;
    for(let j=0;j<pos.count;j++){
      const v = new THREE.Vector3().fromBufferAttribute(pos,j);
      uv.setXY(j, (v.length()-ri)/(ro-ri), 0);
    }
    const rTex = makeRingTexture(
      pd.name==='Saturn' ? ['rgba(210,190,150,0.7)','rgba(180,160,110,0.5)'] :
                           ['rgba(150,200,220,0.4)','rgba(120,170,200,0.25)']
    );
    const rMat = new THREE.MeshBasicMaterial({map:rTex, side:THREE.DoubleSide, transparent:true, opacity:pd.name==='Saturn'?0.85:0.45});
    const ring = new THREE.Mesh(rGeo, rMat);
    ring.rotation.x = Math.PI/2;
    group.add(ring);
  }

  // Moons
  const moonObjects = [];
  pd.moons.forEach((md, mi) => {
    angles[pd.name+'_'+md.name] = Math.random()*Math.PI*2;
    const mTex = makeTexture(md.gradient, 'moon', 128, 64);
    const mGeo = new THREE.SphereGeometry(md.radius, 24, 16);
    const mMat = new THREE.MeshStandardMaterial({map:mTex, roughness:0.9});
    const mMesh = new THREE.Mesh(mGeo, mMat);
    mMesh.userData = {planet: {...md, type:'Moon', diameter:'—', period:'—', distance:'—', moonCount:0, desc:`${md.name} is a natural satellite of ${pd.name}.`}, isMoon:true};
    scene.add(mMesh);
    moonObjects.push({mesh:mMesh, data:md});
  });

  // Orbit line
  if(pd.orbitRadius > 0) {
    const pts = [];
    for(let j=0;j<=256;j++){
      const a = (j/256)*Math.PI*2;
      pts.push(new THREE.Vector3(Math.cos(a)*pd.orbitRadius, 0, Math.sin(a)*pd.orbitRadius));
    }
    const lGeo = new THREE.BufferGeometry().setFromPoints(pts);
    const lMat = new THREE.LineBasicMaterial({color:0x334466, transparent:true, opacity:0.35});
    const line = new THREE.Line(lGeo, lMat);
    scene.add(line);
    orbitLines.push(line);
  }

  // Label sprite
  const spriteCanvas = document.createElement('canvas');
  spriteCanvas.width=160; spriteCanvas.height=32;
  const sc = spriteCanvas.getContext('2d');
  sc.font='500 14px Space Grotesk,sans-serif';
  sc.fillStyle='rgba(255,255,255,0.7)';
  sc.fillText(pd.name, 4, 20);
  const spriteTex = new THREE.CanvasTexture(spriteCanvas);
  const spriteMat = new THREE.SpriteMaterial({map:spriteTex, transparent:true, depthTest:false});
  const sprite = new THREE.Sprite(spriteMat);
  sprite.scale.set(pd.radius*4, pd.radius, 1);
  sprite.visible = showLabels;
  scene.add(sprite);
  labelSprites.push(sprite);

  planetObjects.push({group, mesh, data:pd, moons:moonObjects, sprite});
});

// Raycaster for clicks
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const tooltip = document.getElementById('tooltip');

function getAllMeshes() {
  const meshes = [];
  planetObjects.forEach(p=>{
    meshes.push(p.mesh);
    p.moons.forEach(m=>meshes.push(m.mesh));
  });
  return meshes;
}

renderer.domElement.addEventListener('mousemove', e => {
  mouse.x = (e.clientX/window.innerWidth)*2-1;
  mouse.y = -(e.clientY/window.innerHeight)*2+1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(getAllMeshes());
  if(hits.length>0){
    const obj = hits[0].object;
    tooltip.style.opacity='1';
    tooltip.style.left=(e.clientX+14)+'px';
    tooltip.style.top=(e.clientY-10)+'px';
    tooltip.textContent=obj.userData.planet?.name||'Unknown';
    renderer.domElement.style.cursor='pointer';
  } else {
    tooltip.style.opacity='0';
    renderer.domElement.style.cursor='grab';
  }
});

renderer.domElement.addEventListener('click', e => {
  if(Math.abs(e.clientX-prevMouse.x)>5 || Math.abs(e.clientY-prevMouse.y)>5) return;
  mouse.x = (e.clientX/window.innerWidth)*2-1;
  mouse.y = -(e.clientY/window.innerHeight)*2+1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(getAllMeshes());
  if(hits.length>0){
    const pd = hits[0].object.userData.planet;
    if(pd) showPlanetInfo(pd);
  }
});

// Planet Info Panel
function makeIconCanvas(pd) {
  const c = document.getElementById('info-icon');
  const ctx = c.getContext('2d');
  ctx.clearRect(0,0,44,44);
  const grd = ctx.createRadialGradient(20,18,2, 22,22,20);
  const stops = pd.gradient||['#888','#555'];
  stops.forEach((s,i)=>grd.addColorStop(i/(stops.length-1), s));
  ctx.beginPath(); ctx.arc(22,22,20,0,2*Math.PI);
  ctx.fillStyle=grd; ctx.fill();
}

function showPlanetInfo(pd) {
  selectedPlanet = pd.name;
  document.getElementById('info-name').textContent = pd.name;
  document.getElementById('info-type').textContent = pd.type || 'Moon';
  document.getElementById('stat-diameter').textContent = pd.diameter || '—';
  document.getElementById('stat-period').textContent = pd.period || '—';
  document.getElementById('stat-distance').textContent = pd.distance || '—';
  document.getElementById('stat-moons').textContent = pd.moonCount !== undefined ? pd.moonCount : '—';
  document.getElementById('info-desc').textContent = pd.desc || '';
  makeIconCanvas(pd);
  document.getElementById('planet-info').classList.add('visible');
  // highlight nav
  document.querySelectorAll('.nav-planet').forEach(n=>{
    n.classList.toggle('selected', n.dataset.name===pd.name);
  });
}

document.getElementById('close-btn').addEventListener('click', ()=>{
  document.getElementById('planet-info').classList.remove('visible');
  selectedPlanet=null;
  document.querySelectorAll('.nav-planet').forEach(n=>n.classList.remove('selected'));
});

// Planet Nav
const nav = document.getElementById('planet-nav');
PLANETS.forEach(pd => {
  const div = document.createElement('div');
  div.className='nav-planet';
  div.dataset.name = pd.name;
  const dot = document.createElement('div');
  dot.className='dot';
  const size = pd.name==='Sun'?14 : Math.max(5, Math.min(10, pd.radius*5));
  dot.style.cssText=`width:${size}px;height:${size}px;background:${pd.gradient[1]||pd.color};`;
  if(pd.name==='Sun') dot.style.boxShadow=`0 0 8px ${pd.gradient[1]}`;
  const label = document.createElement('span');
  label.textContent = pd.name;
  div.appendChild(dot);
  div.appendChild(label);
  div.addEventListener('click', ()=>{
    showPlanetInfo(pd);
    // fly camera toward planet
    const obj = planetObjects.find(p=>p.data.name===pd.name);
    if(obj){
      const pos = new THREE.Vector3();
      obj.group.getWorldPosition(pos);
      const d = Math.max(15, pd.radius*10);
      spherical.r = d + pd.orbitRadius*0.3;
    }
  });
  nav.appendChild(div);
});

// Controls
document.getElementById('speed-slider').addEventListener('input', e=>{
  speedMultiplier = parseFloat(e.target.value);
});

document.getElementById('orbits-toggle').addEventListener('click', function(){
  showOrbits = !showOrbits;
  this.classList.toggle('active', showOrbits);
  orbitLines.forEach(l=>l.visible=showOrbits);
});

document.getElementById('labels-toggle').addEventListener('click', function(){
  showLabels = !showLabels;
  this.classList.toggle('active', showLabels);
  labelSprites.forEach(s=>s.visible=showLabels);
});

document.getElementById('reset-btn').addEventListener('click', ()=>{
  spherical = {r:110, phi:Math.PI/4, theta:0};
  speedMultiplier=1;
  document.getElementById('speed-slider').value=1;
});

// Resize
window.addEventListener('resize', ()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Animate
function animate() {
  requestAnimationFrame(animate);
  time += 0.016 * speedMultiplier;

  // Camera orbit
  camera.position.x = spherical.r * Math.sin(spherical.phi)*Math.sin(spherical.theta);
  camera.position.y = spherical.r * Math.cos(spherical.phi);
  camera.position.z = spherical.r * Math.sin(spherical.phi)*Math.cos(spherical.theta);
  camera.lookAt(0,0,0);

  // Rotate sun glow
  planetObjects[0].mesh.rotation.y += 0.002*speedMultiplier;

  planetObjects.forEach((po, i) => {
    const pd = po.data;
    if(pd.orbitRadius===0) return; // sun

    const baseSpeed = pd.speed * 0.008;
    angles[pd.name] += baseSpeed * speedMultiplier * 0.016;
    const a = angles[pd.name];

    po.group.position.x = Math.cos(a)*pd.orbitRadius;
    po.group.position.z = Math.sin(a)*pd.orbitRadius;

    po.mesh.rotation.y += pd.rotSpeed * speedMultiplier;

    // Label position
    if(po.sprite) {
      po.sprite.position.copy(po.group.position);
      po.sprite.position.y += pd.radius*1.6;
    }

    // Moons
    po.moons.forEach(mo => {
      const md = mo.data;
      const key = pd.name+'_'+md.name;
      angles[key] += md.speed*0.008*speedMultiplier*0.016;
      const ma = angles[key];
      mo.mesh.position.x = po.group.position.x + Math.cos(ma)*md.orbitR;
      mo.mesh.position.y = po.group.position.y + Math.sin(ma*0.15)*0.3;
      mo.mesh.position.z = po.group.position.z + Math.sin(ma)*md.orbitR;
      mo.mesh.rotation.y += 0.01*speedMultiplier;
    });
  });

  renderer.render(scene, camera);
}

// Loading sequence
const loadSteps = ['Initializing engine...','Generating textures...','Placing planets...','Calculating orbits...','Launching!'];
let loadStep=0;
const loadBar = document.getElementById('load-bar');
const loadText = document.getElementById('load-text');

function stepLoad(){
  if(loadStep>=loadSteps.length){
    const loading=document.getElementById('loading');
    loading.style.opacity='0';
    setTimeout(()=>loading.style.display='none', 800);
    animate();
    return;
  }
  loadText.textContent=loadSteps[loadStep];
  loadBar.style.width=((loadStep+1)/loadSteps.length*100)+'%';
  loadStep++;
  setTimeout(stepLoad, 280);
}

setTimeout(stepLoad, 100);
</script>
